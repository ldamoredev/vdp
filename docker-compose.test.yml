services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: vdp-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: vdp_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d vdp_test"]
      interval: 2s
      timeout: 5s
      retries: 15

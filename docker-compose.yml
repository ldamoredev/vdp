services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vdp-postgres
    restart: always
    environment:
      POSTGRES_USER: vdp
      POSTGRES_PASSWORD: vdp
      POSTGRES_DB: vdp
    ports:
      - "5432:5432"
    volumes:
      - vdp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vdp -d vdp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: vdp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - vdp_redis:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: vdp-jaeger
    restart: always
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  vdp_postgres:
  vdp_redis:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TZ: America/Argentina/Buenos_Aires
      CI: true

    steps:
      - uses: actions/checkout@v4

      - id: setup-pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @vdp/shared build

      - name: Type check workspace
        run: pnpm typecheck

      - name: Lint workspace
        run: pnpm lint

      - name: Run web unit tests
        run: pnpm --filter @vdp/web test

      - name: Run server unit tests
        run: pnpm --filter @vdp/server test:unit

      - name: Start PostgreSQL 16 test database
        run: pnpm --filter @vdp/server db:test:up

      - name: Run server integration tests
        run: pnpm --filter @vdp/server test:integration

      - name: Run server end-to-end tests
        run: pnpm --filter @vdp/server test:e2e

      - name: Install Playwright Chromium
        run: pnpm --filter @vdp/web exec playwright install --with-deps chromium

      - name: Run web end-to-end tests
        run: pnpm --filter @vdp/web test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore

      - name: Stop test database
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: pnpm --filter @vdp/server db:test:down

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: America/Argentina/Buenos_Aires

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @vdp/shared build

      - name: Type check server
        run: pnpm --filter @vdp/server exec tsc --noEmit

      - name: Type check web
        run: pnpm --filter @vdp/web exec tsc --noEmit

      - name: Run web unit tests
        run: pnpm --filter @vdp/web test

      - name: Run server unit tests
        run: pnpm --filter @vdp/server test:unit

      - name: Start test database
        run: pnpm --filter @vdp/server db:test:up

      - name: Install Playwright Chromium
        run: pnpm --filter @vdp/web exec playwright install --with-deps chromium

      - name: Run end-to-end suite
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore

      - name: Stop test database
        if: always()
        run: pnpm --filter @vdp/server db:test:down

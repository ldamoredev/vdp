name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - server
          - web

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify CI passed on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api repos/${{ github.repository }}/actions/workflows/ci.yml/runs \
            --jq '.workflow_runs | map(select(.head_branch == "main" and .event != "pull_request")) | first | .conclusion')

          if [ "$conclusion" != "success" ]; then
            echo "Latest CI on main: $conclusion"
            echo "Deploy blocked — CI must be green on main before deploying."
            exit 1
          fi

          echo "CI is green on main. Proceeding with deploy."

  deploy-server:
    needs: check-ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.target != 'web'
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Render deploy hook returned HTTP $response"
            exit 1
          fi
          echo "Render deploy triggered (HTTP $response)"

  deploy-web:
    needs: check-ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.target != 'server'
    steps:
      - name: Trigger Vercel deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Vercel deploy hook returned HTTP $response"
            exit 1
          fi
          echo "Vercel deploy triggered (HTTP $response)"
